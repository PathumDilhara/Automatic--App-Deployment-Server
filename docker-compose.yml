services:
  app:
    build: .
    image: serverapp
    container_name: serverapp
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/server_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - server_internal

  db:
    image: postgres:15
    container_name: server_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: server_db
    ports:
      - "5433:5432"
    volumes:
      - server_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - server_internal
volumes:
  server_pgdata:
    external: true
networks:
  server_internal:
    external: true