server:
  port: 8083

spring:
  application:
    name: server

  # Postgres sql db configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/project_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
